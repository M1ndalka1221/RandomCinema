{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h1>{{ title }}</h1>
    
    {% for item in items %}
        <div class="card">
            <h3>{{ item.title }} ({{ item.year }})</h3>
            <p><strong>Genre:</strong> {{ item.genre }}</p>
            <p>{{ item.desc }}</p>
        </div>
    {% endfor %}
    
    {% if items|length == 1 %}
        <a href="/random" class="btn">Try again</a>
    {% endif %}
{% endblock %}
