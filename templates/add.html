{% extends "base.html" %}

{% block title %}Add a movie{% endblock %}

{% block content %}
    <h1>Add new movie</h1>
    
    <form method="POST" action="/add" class="form-container">
        
        <div class="form-group">
            <label for="title"><strong>Title:</strong></label><br>
            <input type="text" id="title" name="title" required class="form-control">
        </div>

        <div class="form-group">
            <label for="genre"><strong>Genre:</strong></label><br>
            <input type="text" id="genre" name="genre" required class="form-control">
        </div>

        <div class="form-group">
            <label for="year"><strong>Year:</strong></label><br>
            <input type="number" id="year" name="year" required class="form-control">
        </div>

        <div class="form-group">
            <label for="desc"><strong>Description:</strong></label><br>
            <textarea id="desc" name="desc" rows="3" required class="form-control"></textarea>
        </div>

        <button type="submit" class="btn">Save</button>
    </form>
{% endblock %}
